<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buzz! - حروف مع أنس</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Tajawal',sans-serif;background:#0a0e27;color:#fff;direction:rtl;user-select:none;-webkit-tap-highlight-color:transparent}
.container{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.setup-panel{width:100%;max-width:400px;text-align:center}
.setup-panel h1{font-size:28px;font-weight:900;color:#f5c842;margin-bottom:24px}
.setup-panel input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 18px;color:#fff;font-size:20px;font-family:'Tajawal',sans-serif;text-align:center;outline:none;margin-bottom:16px;direction:rtl}
.setup-panel input:focus{border-color:#f5c842}
.setup-panel input::placeholder{color:rgba(255,255,255,.3)}
.team-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.team-opt{padding:16px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);cursor:pointer;font-size:16px;font-weight:700;transition:all .2s}
.team-opt.sel{border-width:3px}
.join-btn{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,#f5c842,#f59e0b);color:#0a0e27;border:none;font-size:22px;font-weight:800;font-family:'Tajawal',sans-serif;cursor:pointer}
.join-btn:disabled{opacity:.4;cursor:default}
.buzzer-panel{width:100%;max-width:420px;text-align:center;display:none}
.player-info{margin-bottom:16px}
.player-name-display{font-size:22px;font-weight:800;margin-bottom:4px}
.player-team-display{font-size:14px;color:#8892b0}
.status-bar{padding:12px 20px;border-radius:12px;margin-bottom:20px;font-size:16px;font-weight:600;transition:all .3s}
.status-waiting{background:rgba(255,255,255,.06);color:#8892b0}
.status-ready{background:rgba(34,197,94,.15);color:#22c55e;animation:pulseS 1s infinite}
.status-buzzed{background:rgba(245,200,66,.15);color:#f5c842}
.status-won{background:rgba(34,197,94,.2);color:#22c55e}
.status-locked{background:rgba(239,68,68,.15);color:#ef4444}
.status-muted{background:rgba(239,68,68,.1);color:#ef4444}
@keyframes pulseS{0%,100%{opacity:1}50%{opacity:.6}}

/* Question card on player phone */
.q-card{display:none;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;margin-bottom:20px;text-align:center}
.q-card.visible{display:block}
.q-card-letter{font-size:14px;color:#f5c842;margin-bottom:8px;font-weight:700}
.q-card-text{font-size:20px;font-weight:600;line-height:1.7;color:#fff}
.q-card-cat{font-size:12px;color:#8892b0;margin-top:8px}

/* Timer ring */
.timer-ring-wrap{display:none;margin:0 auto 16px;position:relative;width:90px;height:90px}
.timer-ring-wrap.visible{display:block}
.timer-ring-svg{width:90px;height:90px;transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:6}
.timer-ring-fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .15s linear}
.timer-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;font-family:'Tajawal',sans-serif}

.buzz-btn{width:240px;height:240px;border-radius:50%;border:none;cursor:pointer;font-size:44px;font-weight:900;font-family:'Tajawal',sans-serif;color:#fff;position:relative;transition:all .15s;margin:0 auto;display:flex;align-items:center;justify-content:center;flex-direction:column}
.buzz-btn:active:not(:disabled){transform:scale(.9)}
.buzz-btn:disabled{cursor:default;opacity:.5}
.buzz-btn .buzz-sub{font-size:15px;font-weight:500;opacity:.8;margin-top:4px}
.buzz-btn-idle{background:rgba(255,255,255,.08);box-shadow:none}
.buzz-btn-ready{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 60px rgba(34,197,94,.4),0 0 120px rgba(34,197,94,.15);animation:btnP 1.2s infinite}
.buzz-btn-pressed{background:linear-gradient(135deg,#f5c842,#f59e0b);box-shadow:0 0 60px rgba(245,200,66,.5)}
.buzz-btn-locked{background:rgba(239,68,68,.15);box-shadow:0 0 40px rgba(239,68,68,.15)}
@keyframes btnP{0%,100%{box-shadow:0 0 60px rgba(34,197,94,.3)}50%{box-shadow:0 0 80px rgba(34,197,94,.5)}}
.kicked-msg{text-align:center;padding:40px;font-size:20px;color:#ef4444}
.connected-dot{position:fixed;top:12px;left:12px;width:10px;height:10px;border-radius:50%;background:#ef4444}
.connected-dot.on{background:#22c55e}
</style>
</head>
<body>
<div class="connected-dot" id="conn-dot"></div>
<div class="container">
  <div class="setup-panel" id="setup-panel">
    <h1>⬡ حروف مع أنس</h1>
    <input type="text" id="player-name" placeholder="اكتب اسمك..." maxlength="20">
    <div class="team-pick">
      <div class="team-opt" id="team-opt-1" onclick="pickTeam(1)"><span id="t1label">الفريق ١</span><br><span style="font-size:12px;opacity:.6">← →</span></div>
      <div class="team-opt" id="team-opt-2" onclick="pickTeam(2)"><span id="t2label">الفريق ٢</span><br><span style="font-size:12px;opacity:.6">↑ ↓</span></div>
    </div>
    <button class="join-btn" id="join-btn" onclick="joinGame()" disabled>انضم للعبة</button>
    <p style="color:#ef4444;font-size:13px;margin-top:12px;display:none" id="error-msg"></p>
  </div>
  <div class="buzzer-panel" id="buzzer-panel">
    <div class="player-info">
      <div class="player-name-display" id="p-name"></div>
      <div class="player-team-display" id="p-team"></div>
    </div>
    <div class="status-bar status-waiting" id="status-bar">في انتظار السؤال...</div>
    <div class="q-card" id="q-card">
      <div class="q-card-letter" id="qc-letter"></div>
      <div class="q-card-text" id="qc-text"></div>
      <div class="q-card-cat" id="qc-cat"></div>
    </div>
    <div class="timer-ring-wrap" id="timer-wrap">
      <svg class="timer-ring-svg" viewBox="0 0 100 100">
        <circle class="timer-ring-bg" cx="50" cy="50" r="44"/>
        <circle class="timer-ring-fg" id="timer-ring" cx="50" cy="50" r="44" stroke="#f5c842" stroke-dasharray="276.46" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-ring-text" id="timer-text">3</div>
    </div>
    <button class="buzz-btn buzz-btn-idle" id="buzz-btn" onclick="doBuzz()" disabled>
      <span>🔔</span><span class="buzz-sub">في الانتظار</span>
    </button>
  </div>
  <div class="kicked-msg" id="kicked-msg" style="display:none">تم إخراجك من اللعبة</div>
</div>
<script>
const firebaseConfig={apiKey:"AIzaSyDGs9ZC57R1yaGfyCtFDnj8_VciLEjGFoQ",authDomain:"blockbusters-buzz.firebaseapp.com",databaseURL:"https://blockbusters-buzz-default-rtdb.europe-west1.firebasedatabase.app",projectId:"blockbusters-buzz",storageBucket:"blockbusters-buzz.firebasestorage.app",messagingSenderId:"307733370745",appId:"1:307733370745:web:9506fd3c2ba745fb1141a8"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database(),bRef=db.ref('buzzer');
let myId=null,myName='',myTeam=0,selectedTeam=0,localTimer=null,isMuted=false;
const CIRC=2*Math.PI*44;

// Audio context for bell sound
let audioCtx=null;
function playBell(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';o.frequency.setValueAtTime(880,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200,audioCtx.currentTime+.05);
    o.frequency.exponentialRampToValueAtTime(880,audioCtx.currentTime+.1);
    g.gain.setValueAtTime(.4,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.4);
    o.start();o.stop(audioCtx.currentTime+.4);
  }catch(e){}
}
function playBuzzSound(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='square';o.frequency.setValueAtTime(600,audioCtx.currentTime);
    o.frequency.setValueAtTime(800,audioCtx.currentTime+.08);
    g.gain.setValueAtTime(.3,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.3);
    o.start();o.stop(audioCtx.currentTime+.3);
  }catch(e){}
}

db.ref('.info/connected').on('value',s=>{document.getElementById('conn-dot').classList.toggle('on',s.val()===true)});
bRef.child('teamNames').on('value',s=>{const d=s.val()||{};if(d.t1)document.getElementById('t1label').textContent=d.t1;if(d.t2)document.getElementById('t2label').textContent=d.t2});

function pickTeam(t){
  selectedTeam=t;
  document.getElementById('team-opt-1').classList.toggle('sel',t===1);
  document.getElementById('team-opt-2').classList.toggle('sel',t===2);
  document.getElementById('team-opt-1').style.borderColor=t===1?'#0ea5e9':'rgba(255,255,255,.1)';
  document.getElementById('team-opt-2').style.borderColor=t===2?'#ef4444':'rgba(255,255,255,.1)';
  checkReady();
}
document.getElementById('player-name').addEventListener('input',checkReady);
function checkReady(){document.getElementById('join-btn').disabled=!document.getElementById('player-name').value.trim()||!selectedTeam}

async function joinGame(){
  myName=document.getElementById('player-name').value.trim();myTeam=selectedTeam;
  if(!myName||!myTeam)return;
  // Use push() for unlimited players
  const ref=bRef.child('players').push();
  myId=ref.key;
  await ref.set({name:myName,team:myTeam,online:true,muted:false});
  ref.onDisconnect().update({online:false});
  document.getElementById('setup-panel').style.display='none';
  document.getElementById('buzzer-panel').style.display='block';
  document.getElementById('p-name').textContent=myName;
  document.getElementById('p-name').style.color=myTeam===1?'#0ea5e9':'#ef4444';
  const tn=await bRef.child('teamNames').once('value');
  const tnd=tn.val()||{};
  document.getElementById('p-team').textContent=(myTeam===1?(tnd.t1||'الفريق ١'):(tnd.t2||'الفريق ٢'));
  listenState();listenMyPlayer();
}

// Watch if host kicks/mutes/moves me
function listenMyPlayer(){
  bRef.child('players/'+myId).on('value',snap=>{
    const d=snap.val();
    if(!d){
      // Kicked
      document.getElementById('buzzer-panel').style.display='none';
      document.getElementById('kicked-msg').style.display='block';
      return;
    }
    isMuted=d.muted||false;
    if(d.team!==myTeam){
      myTeam=d.team;
      document.getElementById('p-name').style.color=myTeam===1?'#0ea5e9':'#ef4444';
      bRef.child('teamNames').once('value').then(s=>{
        const tn=s.val()||{};
        document.getElementById('p-team').textContent=(myTeam===1?(tn.t1||'الفريق ١'):(tn.t2||'الفريق ٢'));
      });
    }
  });
}

function listenState(){
  bRef.on('value',snap=>{
    const d=snap.val()||{},state=d.state||'idle',winner=d.winner||null,lockedTeam=d.lockedTeam||null;
    const timer=d.timer||null,question=d.currentQuestion||null;

    // Show/hide question card
    const qc=document.getElementById('q-card');
    if(question&&question.text&&state!=='idle'){
      qc.classList.add('visible');
      document.getElementById('qc-letter').textContent='حرف «'+question.letter+'»';
      document.getElementById('qc-text').textContent=question.text;
      document.getElementById('qc-cat').textContent=question.cat?'التصنيف: '+question.cat:'';
    }else{qc.classList.remove('visible')}

    if(isMuted){
      setBtn('locked','🔇','تم كتمك',true);setStatus('muted','🔇 تم كتمك بواسطة المقدم');hideTimer();return;
    }

    if(state==='idle'){
      setBtn('idle','🔔','في الانتظار',true);setStatus('waiting','في انتظار السؤال...');hideTimer();
    }else if(state==='open'){
      setBtn('ready','🔴','اضغط!',false);setStatus('ready','❗ السؤال مطروح — اضغط للإجابة!');hideTimer();
    }else if(state==='buzzed'){
      if(winner&&winner.id===myId){
        setBtn('pressed','⭐','أنت!',true);setStatus('won','🎉 أنت ضغطت أولاً! أجب الآن');
      }else{
        setBtn('idle','🔔','انتظر',true);setStatus('buzzed','🔔 '+(winner?winner.name:'?')+' ضغط أولاً');
      }
      if(timer&&timer.running)startLocalTimer(timer.endsAt,timer.total,'#f5c842');else hideTimer();
    }else if(state==='team_chance'){
      if(myTeam==lockedTeam){
        setBtn('locked','🚫','محظور',true);setStatus('locked','⏳ فرصة للفريق الآخر...');
      }else{
        setBtn('ready','🔴','اضغط!',false);setStatus('ready','⚡ فرصة لفريقك — اضغط!');
      }
      if(timer&&timer.running)startLocalTimer(timer.endsAt,timer.total,'#f97316');else hideTimer();
    }else if(state==='open_all'){
      setBtn('ready','🔴','اضغط!',false);setStatus('ready','❗ مفتوح للجميع — اضغط!');hideTimer();
    }
  });
}

function setBtn(type,icon,sub,disabled){const b=document.getElementById('buzz-btn');b.className='buzz-btn buzz-btn-'+type;b.innerHTML='<span>'+icon+'</span><span class="buzz-sub">'+sub+'</span>';b.disabled=disabled}
function setStatus(type,text){const e=document.getElementById('status-bar');e.className='status-bar status-'+type;e.textContent=text}
function startLocalTimer(endsAt,total,color){
  clearInterval(localTimer);document.getElementById('timer-wrap').classList.add('visible');
  const ring=document.getElementById('timer-ring');ring.setAttribute('stroke',color);
  const txt=document.getElementById('timer-text');txt.style.color=color;
  function tick(){const left=Math.max(0,(endsAt-Date.now())/1000);ring.style.strokeDashoffset=((1-left/total)*CIRC).toFixed(1);txt.textContent=Math.ceil(left);if(left<=0)clearInterval(localTimer)}
  tick();localTimer=setInterval(tick,100);
}
function hideTimer(){clearInterval(localTimer);document.getElementById('timer-wrap').classList.remove('visible')}

// ATOMIC BUZZ — transaction on winner node, first write wins
async function doBuzz(){
  if(!myId||isMuted)return;
  document.getElementById('buzz-btn').disabled=true;
  playBuzzSound();
  try{
    await bRef.child('winner').transaction(current=>{
      if(current===null)return{id:myId,name:myName,team:myTeam,time:firebase.database.ServerValue.TIMESTAMP};
      return; // abort — someone already won
    });
  }catch(e){console.error(e)}
}

// Listen for winner to set state to buzzed + play bell
bRef.child('winner').on('value',snap=>{
  const w=snap.val();
  if(w&&w.id){
    const curState=document.getElementById('status-bar').className;
    // Play bell sound for everyone when someone buzzes
    playBell();
    if(navigator.vibrate)navigator.vibrate([100,50,100]);
    // Host-side sets state to buzzed via its own listener
  }
});

bRef.child('state').on('value',snap=>{
  const s=snap.val();
  if(s==='open'||s==='team_chance'||s==='open_all'){if(navigator.vibrate)navigator.vibrate(200)}
});

window.addEventListener('beforeunload',()=>{if(myId)bRef.child('players/'+myId+'/online').set(false)});
</script>
</body>
</html>
